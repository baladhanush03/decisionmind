services:
  # Backend API — native Python runtime (faster deploys than Docker)
  - type: web
    name: decisionmind-backend
    env: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SECRET_KEY
        value: decisionmind_super_secret_key_render_2024
      - key: DATABASE_URL
        value: sqlite:///./decisionmind.db
      - key: PYTHON_VERSION
        value: 3.11.0
