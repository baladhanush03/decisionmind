services:
  # Database
  - type: pgo
    name: decisionmind-db
    plan: free

  # Backend API
  - type: web
    name: decisionmind-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: decisionmind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

