services:
  # Backend API (FastAPI via Docker)
  - type: web
    name: decisionmind-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./decisionmind.db
      - key: OPENAI_API_KEY
        value: sk-placeholder-key-replace-with-real-key
      - key: FRONTEND_URL
        value: https://decisionmind.vercel.app

  # Frontend (Static React App served via Vercel - just reference here for docs)
  # The frontend is deployed separately to Vercel using the /frontend directory
